name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - run: cargo fmt --all --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: clippy
          cache-on-failure: "true"
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: test
          cache-on-failure: "true"
      - name: Enable unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true
      - name: Setup delegated cgroup (for reel sandbox tests)
        run: |
          current_cg="/sys/fs/cgroup$(cat /proc/self/cgroup | grep '^0::' | cut -d: -f3)"
          parent_cg="$(dirname "$current_cg")"
          p="/sys/fs/cgroup"
          while [ "$p" != "$parent_cg" ] && [ "$p" != "/" ]; do
            [ -f "$p/cgroup.subtree_control" ] && \
              echo '+memory +pids' | sudo tee "$p/cgroup.subtree_control" 2>/dev/null || true
            next="$(echo "$parent_cg" | sed "s|^$p/||" | cut -d/ -f1)"
            p="$p/$next"
          done
          [ -f "$parent_cg/cgroup.subtree_control" ] && \
            echo '+memory +pids' | sudo tee "$parent_cg/cgroup.subtree_control" 2>/dev/null || true
          cg="$parent_cg/lot-test"
          sudo mkdir -p "$cg/runner"
          sudo chown -R "$(id -u):$(id -g)" "$cg"
          echo '+memory +pids' > "$cg/cgroup.subtree_control"
          echo $$ | sudo tee "$cg/runner/cgroup.procs"
      - run: cargo test --workspace

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: test
          cache-on-failure: "true"
      - run: cargo test --workspace

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: test
          cache-on-failure: "true"
      - name: Exclude workspace from Windows Defender
        shell: powershell
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"
      - name: Setup AppContainer prerequisites
        run: |
          cargo run -p lot-cli -- setup --verbose
          cargo run -p reel-cli -- setup --verbose
      - run: cargo test --workspace

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: build
          cache-on-failure: "true"
      - run: cargo build --workspace
