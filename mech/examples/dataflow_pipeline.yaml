# dataflow_pipeline.yaml
#
# Demonstrates dataflow mode: blocks declare what they depend on via
# `depends_on:`, and the runtime executes them in topological order,
# running independent blocks in parallel.
#
# DAG shape:
#
#   extract
#   ├── analyze   (depends_on: [extract])
#   └── summarize (depends_on: [extract])
#
# `analyze` and `summarize` are independent — the runtime may run them
# concurrently once `extract` completes.
#
# Key concepts shown:
#   - `depends_on:` for DAG-based scheduling (dataflow mode)
#   - parallel execution of independent sibling blocks
#   - referencing upstream block output via `blocks.<name>.output.*`
#   - explicit function `output:` schema (avoids inference ambiguity when
#     multiple terminal blocks exist with different shapes)

workflow:
  system: "You are a document analysis assistant."

  agents:
    default:
      model: sonnet

  agent: "$ref:#default"

functions:
  analyze_document:
    input:
      type: object
      required: [document]
      properties:
        document: { type: string }

    # Explicit output schema avoids inference ambiguity: `analyze` and
    # `summarize` are both terminal blocks but have different output shapes.
    # Declaring the function output explicitly tells the runtime what to
    # return to the caller.
    output:
      type: object
      required: [insights, summary]
      properties:
        insights: { type: array, items: { type: string } }
        summary:  { type: string }

    blocks:
      # Stage 1: extract structured facts from the raw document.
      # All downstream blocks depend on this one.
      extract:
        prompt: |
          Extract the key facts from the following document.
          Document: {{input.document}}
        schema:
          type: object
          required: [facts, topic]
          properties:
            facts: { type: array, items: { type: string } }
            topic: { type: string }
        # No `depends_on` — this is the source node in the DAG.

      # Stage 2a: deep analysis of the extracted facts.
      # Depends on `extract`; can run in parallel with `summarize`.
      analyze:
        prompt: |
          Perform a detailed analysis of the following facts about "{{blocks.extract.output.topic}}":
          {{blocks.extract.output.facts}}
        schema:
          type: object
          required: [insights, sentiment]
          properties:
            insights: { type: array, items: { type: string } }
            sentiment: { type: string, enum: [positive, neutral, negative] }
        depends_on: [extract]   # must run after extract

      # Stage 2b: concise summary for quick reading.
      # Also depends only on `extract`, so it runs in parallel with `analyze`.
      summarize:
        prompt: |
          Write a concise one-paragraph summary of "{{blocks.extract.output.topic}}"
          based on these facts: {{blocks.extract.output.facts}}
        schema:
          type: object
          required: [title, body]
          properties:
            title: { type: string }
            body:  { type: string }
        depends_on: [extract]   # must run after extract; independent of analyze
